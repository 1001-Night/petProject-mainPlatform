name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint
        working-directory: backend
        run: ruff check .

      - name: Test
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest

      - name: Build Docker image
        run: docker build -t mainplatform-backend:${{ github.sha }} ./backend
      
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: mainplatform-backend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=ghcr.io/$OWNER/mainplatform-backend
          docker tag mainplatform-backend:${{ github.sha }} $IMAGE_NAME:${{ github.sha }}
          docker tag mainplatform-backend:${{ github.sha }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest
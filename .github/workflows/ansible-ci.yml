name: Ansible CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "infra/ansible/**"
      - ".github/workflows/ansible-ci.yml"
  pull_request:
    paths:
      - "infra/ansible/**"
      - ".github/workflows/ansible-ci.yml"

permissions:
  contents: read

jobs:
  ansible:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible tools
        run: pip install ansible-core==2.19.4 ansible-lint==26.4.0

      - name: Install Ansible collections
        working-directory: infra/ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Syntax check
        working-directory: infra/ansible
        env:
          ANSIBLE_ROLES_PATH: roles
        run: ansible-playbook -i inventory.example.ini --syntax-check site.yml

      - name: Lint
        working-directory: infra/ansible
        env:
          ANSIBLE_ROLES_PATH: roles
        run: ansible-lint site.yml
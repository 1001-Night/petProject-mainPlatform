name: Kubernetes CI

on:
  push:
    branches: ["main"]
    paths:
      - "infra/kubernetes/**"
      - ".github/workflows/kubernetes-ci.yml"
  pull_request:
    paths:
      - "infra/kubernetes/**"
      - ".github/workflows/kubernetes-ci.yml"

permissions:
  contents: read

jobs:
  kubernetes-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Render manifests with Kustomize
        run: kubectl kustomize infra/kubernetes
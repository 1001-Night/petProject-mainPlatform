name: Promote image

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Component to deploy"
        required: true
        type: choice
        options:
          - backend
          - frontend
      image_tag:
        description: "Full 40-character Git commit SHA"
        required: true
        type: string

permissions:
  contents: write
  packages: read

concurrency:
  group: production-promotion
  cancel-in-progress: false

jobs:
  promote:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04

    environment:
      name: application-production

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate and update image
        env:
          COMPONENT: ${{ inputs.component }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ ! "$IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]]; then
            echo "image_tag must be a full 40-character Git SHA" >&2
            exit 1
          fi

          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$OWNER/mainplatform-$COMPONENT:$IMAGE_TAG"

          docker manifest inspect "$IMAGE" >/dev/null

          case "$COMPONENT" in
            backend)
              files=(
                infra/kubernetes/backend.yaml
                infra/kubernetes/migration-job.yaml
              )
              ;;
            frontend)
              files=(infra/kubernetes/frontend.yaml)
              ;;
          esac

          for file in "${files[@]}"; do
            sed -i -E \
              "s|image: ghcr.io/[^/]+/mainplatform-$COMPONENT:[^[:space:]]+|image: $IMAGE|" \
              "$file"
            grep -F "image: $IMAGE" "$file" >/dev/null
          done

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Render manifests
        run: kubectl kustomize infra/kubernetes >/dev/null

      - name: Validate manifests
        run: |
          kubectl kustomize infra/kubernetes |
            docker run --rm -i ghcr.io/yannh/kubeconform:v0.8.0 \
              -strict \
              -summary \
              -ignore-missing-schemas \
              -kubernetes-version 1.32.0

      - name: Commit promotion
        env:
          COMPONENT: ${{ inputs.component }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add infra/kubernetes
          git diff --cached --quiet && exit 0

          git commit -m "deploy: promote $COMPONENT to ${IMAGE_TAG::7}"
          git pull --rebase origin main
          git push origin HEAD:main

name: Scripts CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "infra/scripts/**"
      - ".github/workflows/scripts-ci.yml"
  pull_request:
    paths:
      - "infra/scripts/**"
      - ".github/workflows/scripts-ci.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Check shell scripts
        run: shellcheck infra/scripts/*.sh
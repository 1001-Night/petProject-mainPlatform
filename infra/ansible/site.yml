---
- name: Configure Tailscale subnet router
  hosts: kube_control_plane[0]
  become: true
  roles:
    - tailscale_subnet_router
  tags:
    - tailscale

- name: Bootstrap kubeadm Kubernetes cluster
  hosts: kube_cluster
  become: true
  roles:
    - kubeadm_cluster

- name: Install Kubernetes cluster addons
  hosts: kube_control_plane[0]
  become: true
  roles:
    - cluster_addons
  tags:
    - cluster_addons

- name: Bootstrap GitOps application
  hosts: kube_control_plane[0]
  become: true
  roles:
    - gitops_bootstrap
  tags:
    - gitops_bootstrap

---
- name: Check application namespace
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - get
      - namespace
      - mainplatform
  register: application_namespace
  changed_when: false
  failed_when: false

- name: Create application namespace
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - create
      - namespace
      - mainplatform
  when: application_namespace.rc != 0
  changed_when: true

- name: Check application secret
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - get
      - secret
      - mainplatform-secret
      - --namespace
      - mainplatform
  register: application_secret
  changed_when: false
  failed_when: false

- name: Create application secret
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      password="$(openssl rand -hex 24)"

      kubectl --kubeconfig /etc/kubernetes/admin.conf create secret generic mainplatform-secret \
        --namespace mainplatform \
        --from-literal=POSTGRES_PASSWORD="$password" \
        --from-literal=DATABASE_URL="postgresql+psycopg://app:$password@postgres:5432/app"
    executable: /bin/bash
  when: application_secret.rc != 0
  changed_when: true
  no_log: true

- name: Copy Argo CD application
  ansible.builtin.copy:
    src: mainplatform-application.yaml
    dest: /tmp/mainplatform-application.yaml
    mode: "0644"

- name: Apply Argo CD application
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - apply
      - --filename
      - /tmp/mainplatform-application.yaml
  register: argocd_application_apply
  changed_when: >-
    'created' in argocd_application_apply.stdout or
    'configured' in argocd_application_apply.stdout

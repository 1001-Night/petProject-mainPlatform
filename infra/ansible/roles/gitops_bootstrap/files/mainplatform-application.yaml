apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mainplatform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/1001-Night/petProject-mainPlatform.git
    targetRevision: main
    path: infra/kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: mainplatform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

---
- name: Check installed Helm version
  ansible.builtin.command:
    cmd: /usr/local/bin/helm version --short
  register: helm_installed
  changed_when: false
  failed_when: false

- name: Install Helm
  when: helm_version not in helm_installed.stdout
  block:
    - name: Download Helm archive
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
        dest: "/tmp/helm-{{ helm_version }}.tar.gz"
        mode: "0644"

    - name: Extract Helm archive
      ansible.builtin.unarchive:
        src: "/tmp/helm-{{ helm_version }}.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install Helm binary
      ansible.builtin.copy:
        src: "/tmp/linux-{{ helm_arch }}/helm"
        dest: /usr/local/bin/helm
        remote_src: true
        owner: root
        group: root
        mode: "0755"

- name: Install Helm diff plugin
  kubernetes.core.helm_plugin:
    binary_path: /usr/local/bin/helm
    plugin_path: https://github.com/databus23/helm-diff
    plugin_version: "{{ helm_diff_version }}"
    state: present
    verify: false

- name: Copy ingress-nginx values
  ansible.builtin.copy:
    src: ingress-nginx-values.yaml
    dest: /tmp/ingress-nginx-values.yaml
    mode: "0644"

- name: Install or upgrade ingress-nginx
  kubernetes.core.helm:
    binary_path: /usr/local/bin/helm
    kubeconfig: /etc/kubernetes/admin.conf
    release_name: ingress-nginx
    chart_ref: ingress-nginx
    chart_repo_url: https://kubernetes.github.io/ingress-nginx
    chart_version: "{{ ingress_nginx_chart_version }}"
    release_namespace: ingress-nginx
    create_namespace: true
    values_files:
      - /tmp/ingress-nginx-values.yaml
    state: present
    wait: true
    atomic: true
    timeout: 5m0s
    history_max: 5

- name: Download cert-manager manifests
  ansible.builtin.get_url:
    url: "https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml"
    dest: "/tmp/cert-manager-{{ cert_manager_version }}.yaml"
    mode: "0644"

- name: Check installed cert-manager version
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - get
      - deployment/cert-manager
      - --namespace
      - cert-manager
      - --output
      - "jsonpath={.spec.template.spec.containers[0].image}"
  register: cert_manager_installed
  changed_when: false
  failed_when: false

- name: Apply cert-manager manifests
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - apply
      - --filename
      - "/tmp/cert-manager-{{ cert_manager_version }}.yaml"
  when:
    - cert_manager_installed.rc != 0 or cert_manager_version not in cert_manager_installed.stdout

- name: Wait for cert-manager deployments
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - rollout
      - status
      - "deployment/{{ item }}"
      - --namespace
      - cert-manager
      - --timeout=5m
  loop:
    - cert-manager
    - cert-manager-cainjector
    - cert-manager-webhook
  changed_when: false

- name: Copy ClusterIssuer manifest
  ansible.builtin.copy:
    src: cluster-issuer.yaml
    dest: /tmp/cluster-issuer.yaml
    mode: "0644"

- name: Apply ClusterIssuer
  ansible.builtin.command:
    cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf apply --filename /tmp/cluster-issuer.yaml
  register: cluster_issuer_apply
  changed_when: "'created' in cluster_issuer_apply.stdout or 'configured' in cluster_issuer_apply.stdout"

- name: Wait for ClusterIssuer
  ansible.builtin.command:
    cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf wait --for=condition=Ready clusterissuer/letsencrypt-prod --timeout=120s
  changed_when: false

- name: Download local-path provisioner manifests
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/rancher/local-path-provisioner/{{ local_path_version }}/deploy/local-path-storage.yaml"
    dest: "/tmp/local-path-{{ local_path_version }}.yaml"
    mode: "0644"

- name: Apply local-path provisioner manifests
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - apply
      - --filename
      - "/tmp/local-path-{{ local_path_version }}.yaml"
  register: local_path_apply
  changed_when: "'created' in local_path_apply.stdout or 'configured' in local_path_apply.stdout"

- name: Wait for local-path provisioner
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - rollout
      - status
      - deployment/local-path-provisioner
      - --namespace
      - local-path-storage
      - --timeout=5m
  changed_when: false

- name: Check monitoring namespace
  ansible.builtin.command:
    cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf get namespace monitoring
  register: monitoring_namespace
  changed_when: false
  failed_when: false

- name: Create monitoring namespace
  ansible.builtin.command:
    cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf create namespace monitoring
  when: monitoring_namespace.rc != 0

- name: Check Grafana admin secret
  ansible.builtin.command:
    cmd: kubectl --kubeconfig /etc/kubernetes/admin.conf get secret monitoring-grafana-admin --namespace monitoring
  register: grafana_admin_secret
  changed_when: false
  failed_when: false

- name: Create Grafana admin secret
  ansible.builtin.shell:
    cmd: |
      password="$(openssl rand -base64 32)"
      kubectl --kubeconfig /etc/kubernetes/admin.conf create secret generic monitoring-grafana-admin \
        --namespace monitoring \
        --from-literal=admin-user=admin \
        --from-literal=admin-password="$password"
  when: grafana_admin_secret.rc != 0
  no_log: true

- name: Copy kube-prometheus-stack values
  ansible.builtin.copy:
    src: kube-prometheus-stack-values.yaml
    dest: /tmp/kube-prometheus-stack-values.yaml
    mode: "0644"

- name: Install or upgrade kube-prometheus-stack
  kubernetes.core.helm:
    binary_path: /usr/local/bin/helm
    kubeconfig: /etc/kubernetes/admin.conf
    release_name: monitoring
    chart_ref: kube-prometheus-stack
    chart_repo_url: https://prometheus-community.github.io/helm-charts
    chart_version: "{{ kube_prometheus_stack_chart_version }}"
    release_namespace: monitoring
    create_namespace: true
    values_files:
      - /tmp/kube-prometheus-stack-values.yaml
    state: present
    wait: true
    atomic: true
    timeout: 10m0s
    history_max: 5
---
- name: Persist IPv4 forwarding
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-tailscale.conf
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1

- name: Read IPv4 forwarding state
  ansible.builtin.command: sysctl -n net.ipv4.ip_forward
  register: ipv4_forwarding
  changed_when: false

- name: Enable IPv4 forwarding at runtime
  ansible.builtin.command: sysctl -w net.ipv4.ip_forward=1
  when: ipv4_forwarding.stdout != "1"
  changed_when: true

- name: Check Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Determine whether Tailscale is connected
  ansible.builtin.set_fact:
    tailscale_is_connected: >-
      {{
        tailscale_status.rc == 0
        and (tailscale_status.stdout | from_json).BackendState == "Running"
      }}

- name: Require auth key for initial connection
  ansible.builtin.assert:
    that:
      - tailscale_auth_key | length > 0
    fail_msg: TAILSCALE_AUTH_KEY is required for initial connection
  when: not tailscale_is_connected
  no_log: true

- name: Connect control-plane to Tailscale
  ansible.builtin.shell: |
    tailscale up \
      --auth-key="$TS_AUTH_KEY" \
      --hostname="{{ tailscale_node_name }}" \
      --advertise-routes="{{ tailscale_advertised_routes }}"
  environment:
    TS_AUTH_KEY: "{{ tailscale_auth_key }}"
  when: not tailscale_is_connected
  no_log: true

- name: Configure advertised subnet routes
  ansible.builtin.command:
    argv:
      - tailscale
      - set
      - "--hostname={{ tailscale_node_name }}"
      - "--advertise-routes={{ tailscale_advertised_routes }}"
  changed_when: false

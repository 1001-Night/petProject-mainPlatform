apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend
  namespace: mainplatform
spec:
  groups:
    - name: backend.rules
      rules:
        - alert: BackendDown
          expr: (sum(up{namespace="mainplatform", service="backend"}) or vector(0)) < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Backend service is down"
            description: "The backend service is currently down."
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend
  namespace: mainplatform
spec:
  groups:
    - name: backend.rules
      rules:
        - alert: BackendDown
          expr: (sum(up{namespace="mainplatform", service="backend"}) or vector(0)) < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Backend service is down"
            description: "The backend service is currently down."
        - alert: BackendHighErrorRate
          expr: |
            100 *
            (
              sum(rate(http_requests_total{
                namespace="mainplatform",
                service="backend",
                status=~"5.."
              }[5m])) or vector(0)
            )
            /
            clamp_min(
              sum(rate(http_requests_total{
                namespace="mainplatform",
                service="backend"
              }[5m])),
              0.001
            ) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Backend has high 5xx error rate"
            description: "More than 5% of backend requests are returning 5xx for 5 minutes."
        - alert: BackendHighLatencyP95
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(http_request_duration_highr_seconds_bucket{
                  namespace="mainplatform",
                  service="backend"
                }[5m])
              )
            ) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Backend p95 latency is high"
            description: "Backend p95 latency is above 500 ms for 5 minutes."
